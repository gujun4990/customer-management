name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: customer-management/package-lock.json

      - name: Install frontend dependencies
        working-directory: customer-management
        run: npm ci

      - name: TypeScript check
        working-directory: customer-management
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: customer-management
        run: npm run build

  rust-backend:
    name: Rust Backend Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: customer-management/src-tauri

      - name: Check Rust
        working-directory: customer-management/src-tauri
        run: cargo check --all-targets

      - name: Build Rust
        working-directory: customer-management/src-tauri
        run: cargo build --release --verbose

  test:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    needs: [rust-backend]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: customer_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: customer-management/src-tauri

      - name: Run tests
        working-directory: customer-management/src-tauri
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customer_management
        run: cargo test --all-targets

  release:
    name: Release Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [frontend, rust-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: customer-management-linux-x64
          - os: windows-latest
            artifact_name: customer-management-windows-x64
          - os: macos-latest
            artifact_name: customer-management-macos-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: customer-management
        run: npm ci

      - name: Install Tauri CLI
        working-directory: customer-management
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri app
        working-directory: customer-management
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            customer-management/src-tauri/target/release/bundle/**/*.deb
            customer-management/src-tauri/target/release/bundle/**/*.rpm
            customer-management/src-tauri/target/release/bundle/**/*.AppImage
            customer-management/src-tauri/target/release/bundle/**/*.dmg
            customer-management/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: ignore
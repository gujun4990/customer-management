name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: customer-management/package-lock.json

      - name: Install frontend dependencies
        working-directory: customer-management
        run: npm ci

      - name: TypeScript check
        working-directory: customer-management
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: customer-management
        run: npm run build

  rust-backend:
    name: Rust Backend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: customer-management/src-tauri

      - name: Check Rust
        working-directory: customer-management/src-tauri
        run: cargo check --all-targets

      - name: Build Rust
        working-directory: customer-management/src-tauri
        run: cargo build --release --verbose

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [rust-backend]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: customer_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: customer-management/src-tauri

      - name: Run tests
        working-directory: customer-management/src-tauri
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customer_management
        run: cargo test --all-targets